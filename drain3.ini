[DRAIN]
# Similary threshold for clustering log messages
sim_th = 0.4
# Max depth of the parsing tree
depth = 4
# Maximum number of children a node can have
max_children = 100
# True to cluster log messages by ignoring variables
parametrize_numeric_tokens = True

[MASKING]
# Tell Drain3 to hide numbers and specific patterns to find the core template
masking = [
    {"regex_pattern":"((?<=[^A-Za-z0-9])|^)([0-9a-fA-F]{4,})((?=[^A-Za-z0-9])|$)", "mask_with": "HEX"},
    {"regex_pattern":"((?<=[^A-Za-z0-9])|^)([0-9]{1,})((?=[^A-Za-z0-9])|$)", "mask_with": "NUM"}
    ]